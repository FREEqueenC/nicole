<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <!-- Neon green gradient -->
    <linearGradient id="neonGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <!-- Violet accent gradient -->
    <linearGradient id="violetAccent" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <!-- Outer glow filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background circle - dark with subtle border -->
  <circle cx="256" cy="256" r="248" fill="#0a0a0a" stroke="url(#neonGreen)" stroke-width="2" opacity="0.4"/>
  
  <!-- Inner hexagon frame - tech aesthetic -->
  <polygon 
    points="256,48 438,152 438,360 256,464 74,360 74,152" 
    fill="none" 
    stroke="url(#neonGreen)" 
    stroke-width="3" 
    opacity="0.3"
  />
  
  <!-- Circuit lines - left side -->
  <path 
    d="M74,256 L120,256 L140,236 M74,200 L100,200 L120,180" 
    stroke="url(#violetAccent)" 
    stroke-width="2" 
    fill="none" 
    opacity="0.5"
  />
  
  <!-- Circuit lines - right side -->
  <path 
    d="M438,256 L392,256 L372,276 M438,312 L412,312 L392,332" 
    stroke="url(#violetAccent)" 
    stroke-width="2" 
    fill="none" 
    opacity="0.5"
  />
  
  <!-- Main "N" letterform with glow -->
  <g filter="url(#glow)">
    <!-- N letter - bold geometric style -->
    <path 
      d="M168,368 L168,144 L200,144 L200,280 L312,144 L344,144 L344,368 L312,368 L312,232 L200,368 Z" 
      fill="url(#neonGreen)"
    />
  </g>
  
  <!-- Orbital ring - representing "Oracle" -->
  <ellipse 
    cx="256" 
    cy="256" 
    rx="180" 
    ry="60" 
    fill="none" 
    stroke="url(#neonGreen)" 
    stroke-width="2" 
    opacity="0.4"
    transform="rotate(-20, 256, 256)"
  />
  
  <!-- Small orbital dot - "scanning" indicator -->
  <circle cx="420" cy="200" r="8" fill="url(#violetAccent)" opacity="0.9"/>
  
  <!-- Corner tech markers -->
  <rect x="80" y="80" width="16" height="16" fill="none" stroke="url(#neonGreen)" stroke-width="2" opacity="0.6"/>
  <rect x="416" y="80" width="16" height="16" fill="none" stroke="url(#neonGreen)" stroke-width="2" opacity="0.6"/>
  <rect x="80" y="416" width="16" height="16" fill="none" stroke="url(#neonGreen)" stroke-width="2" opacity="0.6"/>
  <rect x="416" y="416" width="16" height="16" fill="none" stroke="url(#neonGreen)" stroke-width="2" opacity="0.6"/>
  
  <!-- Center node dot -->
  <circle cx="256" cy="420" r="6" fill="url(#neonGreen)" opacity="0.8"/>
</svg>
